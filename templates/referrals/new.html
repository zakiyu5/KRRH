{% extends 'base.html' %}
{% block content %}
<div class="container">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card">
                <div class="card-header bg-white">
                    <h4 class="mb-0">New Referral</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Patient ID</label>
                                <input type="text" class="form-control" name="patient_id" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Patient Name</label>
                                <input type="text" class="form-control" name="patient_name" required>
                            </div>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">From Ward</label>
                                <input type="text" class="form-control" name="from_ward" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">To Hospital</label>
                                <select class="form-select" name="to_hospital_id" required>
                                    <option value="">Select Hospital</option>
                                    {% for hospital in hospitals %}
                                    <option value="{{ hospital.id }}">{{ hospital.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Referral Reason</label>
                            <textarea class="form-control" name="referral_reason" rows="3" required></textarea>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Referral Date</label>
                                <input type="date" class="form-control" name="referral_date" 
                                       value="{{ now.strftime('%Y-%m-%d') }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Estimated Arrival Date</label>
                                <input type="date" class="form-control" name="estimated_arrival_date">
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('referral_list') }}" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Create Referral</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
